<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hikoo — Rencontres authentiques autour d’activités</title>
    <meta name="description" content="Découvrez Hikoo, l’application qui facilite les rencontres authentiques autour d’activités et de centres d’intérêt communs.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://ronfl3x.github.io/tryhikoo-github-pages/">
    <meta property="og:title" content="Hikoo — Rencontres authentiques autour d’activités">
    <meta property="og:description" content="Créez des liens dans la vraie vie grâce à des activités partagées.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ronfl3x.github.io/tryhikoo-github-pages/">
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f7fb;
        color: #20202a;
      }

      * { box-sizing: border-box; }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 20% 20%, rgba(142, 99, 255, .16), transparent 34rem),
          radial-gradient(circle at 80% 80%, rgba(255, 117, 138, .14), transparent 30rem),
          #f7f7fb;
      }

      main {
        width: min(720px, 100%);
        padding: clamp(32px, 7vw, 64px);
        border: 1px solid rgba(32, 32, 42, .08);
        border-radius: 28px;
        background: rgba(255, 255, 255, .88);
        box-shadow: 0 24px 70px rgba(48, 35, 86, .12);
        text-align: center;
      }

      .eyebrow {
        margin: 0 0 16px;
        color: #7550e8;
        font-size: .82rem;
        font-weight: 800;
        letter-spacing: .13em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.35rem, 8vw, 4.8rem);
        line-height: .95;
        letter-spacing: -.055em;
      }

      p {
        max-width: 560px;
        margin: 24px auto 32px;
        color: #626271;
        font-size: clamp(1rem, 2.2vw, 1.2rem);
        line-height: 1.65;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 52px;
        padding: 0 24px;
        border-radius: 999px;
        background: #20202a;
        color: #fff;
        font-weight: 750;
        text-decoration: none;
        transition: transform .2s ease, background .2s ease;
      }

      a:hover { transform: translateY(-2px); background: #7550e8; }
      a:focus-visible { outline: 3px solid #bba9ff; outline-offset: 4px; }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Des rencontres qui comptent</p>
      <h1>Hikoo</h1>
      <p>
        Hikoo aide à créer des liens authentiques dans la vraie vie grâce à des
        activités et des centres d’intérêt partagés.
      </p>
      <a href="https://www.tryhikoo.com" rel="noopener">Découvrir Hikoo</a>
    </main>
  </body>
</html>
